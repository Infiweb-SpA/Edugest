{% extends 'biblioteca/base.html' %}
{% block biblioteca_content %}

<div class="max-w-2xl mx-auto bg-white rounded-xl border border-gray-200 p-6 shadow-xs">
    <h3 class="text-lg font-bold text-gray-900 mb-4">🔄 Nuevo Préstamo</h3>
    
    <form method="POST" class="space-y-4">
        <div>
            <label class="block text-sm font-medium text-gray-700 mb-1">Libro *</label>
            <select name="book_id" required 
                    class="w-full px-3 py-2 border border-gray-300 rounded-lg focus:ring-2 focus:ring-indigo-500">
                <option value="">Seleccione un libro...</option>
                {% for libro in libros %}
                <option value="{{ libro.BookId }}">
                    {{ libro.Title }} — {{ libro.Author }} (Disp: {{ libro.AvailableStock }})
                </option>
                {% endfor %}
            </select>
        </div>
        
        <div>
            <label class="block text-sm font-medium text-gray-700 mb-1">Persona *</label>
            <select name="persona_id" required 
                    class="w-full px-3 py-2 border border-gray-300 rounded-lg focus:ring-2 focus:ring-indigo-500">
                <option value="">Seleccione una persona...</option>
                {% for persona in personas %}
                <option value="{{ persona.PersonId }}">
                    {{ persona.LastName }}, {{ persona.FirstName }} 
                    (RUT: {{ persona.identifiers[0].Identifier if persona.identifiers else 'N/A' }})
                </option>
                {% endfor %}
            </select>
        </div>
        
        <div>
            <label class="block text-sm font-medium text-gray-700 mb-1">Días de préstamo</label>
            <select name="dias_prestamo" class="w-full px-3 py-2 border border-gray-300 rounded-lg focus:ring-2 focus:ring-indigo-500">
                <option value="7">7 días (1 semana)</option>
                <option value="14">14 días (2 semanas)</option>
                <option value="30">30 días (1 mes)</option>
            </select>
        </div>
        
        <div class="flex justify-end gap-2 pt-4">
            <a href="{{ url_for('biblioteca.prestamos') }}" 
               class="px-4 py-2 text-sm font-medium text-gray-700 border border-gray-300 rounded-lg hover:bg-gray-50">
                Cancelar
            </a>
            <button type="submit" 
                    class="px-4 py-2 text-sm font-medium text-white bg-indigo-600 rounded-lg hover:bg-indigo-700">
                Registrar Préstamo
            </button>
        </div>
    </form>
</div>

{% endblock %}
