{% extends 'biblioteca/base.html' %}
{% block biblioteca_content %}

<div class="max-w-2xl mx-auto bg-white rounded-xl border border-gray-200 p-6 shadow-xs">
    <h3 class="text-lg font-bold text-gray-900 mb-4">
        {% if libro %}✏️ Editar Libro{% else %}➕ Nuevo Libro{% endif %}
    </h3>
    
    <form method="POST" class="space-y-4">
        <div>
            <label class="block text-sm font-medium text-gray-700 mb-1">Título *</label>
            <input type="text" name="titulo" required value="{{ libro.Title if libro else '' }}"
                   class="w-full px-3 py-2 border border-gray-300 rounded-lg focus:ring-2 focus:ring-indigo-500">
        </div>
        
        <div>
            <label class="block text-sm font-medium text-gray-700 mb-1">Autor *</label>
            <input type="text" name="autor" required value="{{ libro.Author if libro else '' }}"
                   class="w-full px-3 py-2 border border-gray-300 rounded-lg focus:ring-2 focus:ring-indigo-500">
        </div>
        
        <div>
            <label class="block text-sm font-medium text-gray-700 mb-1">ISBN</label>
            <input type="text" name="isbn" value="{{ libro.Isbn if libro else '' }}"
                   class="w-full px-3 py-2 border border-gray-300 rounded-lg focus:ring-2 focus:ring-indigo-500">
            <p class="text-xs text-gray-400 mt-1">Si lo deja vacío, se generará automáticamente.</p>
        </div>
        
        <div>
            <label class="block text-sm font-medium text-gray-700 mb-1">Stock Total *</label>
            <input type="number" name="stock_total" required min="1" 
                   value="{{ libro.TotalStock if libro else 1 }}"
                   class="w-full px-3 py-2 border border-gray-300 rounded-lg focus:ring-2 focus:ring-indigo-500">
        </div>
        
        <div class="flex items-center p-3 bg-slate-50 rounded-lg border border-gray-100">
            <input id="is_virtual" name="is_virtual" type="checkbox" 
                   {% if libro and libro.IsVirtual %}checked{% endif %}
                   class="h-4 w-4 rounded border-gray-300 text-indigo-600 focus:ring-indigo-500">
            <label for="is_virtual" class="ml-2 block text-sm font-medium text-gray-700 cursor-pointer">
                Es un libro digital (e-book)
            </label>
        </div>
        
        <div id="url_container" class="{% if not libro or not libro.IsVirtual %}hidden{% endif %}">
            <label class="block text-sm font-medium text-gray-700 mb-1">URL de descarga</label>
            <input type="url" name="file_url" value="{{ libro.FileUrl if libro else '' }}"
                   placeholder="https://..."
                   class="w-full px-3 py-2 border border-gray-300 rounded-lg focus:ring-2 focus:ring-indigo-500">
        </div>
        
        <div class="flex justify-end gap-2 pt-4">
            <a href="{{ url_for('biblioteca.catalogo') }}" 
               class="px-4 py-2 text-sm font-medium text-gray-700 border border-gray-300 rounded-lg hover:bg-gray-50">
                Cancelar
            </a>
            <button type="submit" 
                    class="px-4 py-2 text-sm font-medium text-white bg-indigo-600 rounded-lg hover:bg-indigo-700">
                {% if libro %}Guardar Cambios{% else %}Registrar Libro{% endif %}
            </button>
        </div>
    </form>
</div>

<script>
    document.getElementById('is_virtual').addEventListener('change', function() {
        document.getElementById('url_container').classList.toggle('hidden', !this.checked);
    });
</script>

{% endblock %}
